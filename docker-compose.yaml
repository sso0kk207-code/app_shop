version: '3.8'
services:
  web:
    build: .
    container_name: sfmshop_app
    image: sfmshop-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - sfm_network
  db:
    container_name: sfmshop_db
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sfm_network
  redis:
    image: redis:7-alpine
    container_name: sfmshop_redis
    restart: always
    networks:
      - sfm_network

networks:
  sfm_network:
    driver: bridge

volumes:
  postgres_data:
